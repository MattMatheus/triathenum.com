<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Triathenum</title>
    <meta
      name="description"
      content="A minimal link page for Matt Matheus across X, GitHub, and Substack."
    >
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <div class="shell__glow shell__glow--one"></div>
      <div class="shell__glow shell__glow--two"></div>

      <section class="hero" aria-labelledby="page-title">
        <p class="hero__eyebrow">Triathenum</p>
        <h1 id="page-title">Matt Matheus</h1>
        <p class="hero__lede">
          Do not stack failure modes | Advocating for the safe use of AI
        </p>
      </section>

      <section class="links" aria-label="External links">
        <a class="card card--x" href="https://x.com/triathenum" target="_blank" rel="noreferrer me">
          <span class="card__label">X</span>
          <strong class="card__title">Short-form posts</strong>
          <span class="card__meta">@triathenum</span>
        </a>

        <a class="card card--github" href="https://github.com/mattmatheus" target="_blank" rel="noreferrer me">
          <span class="card__label">GitHub</span>
          <strong class="card__title">Code and experiments</strong>
          <span class="card__meta">github.com/mattmatheus</span>
        </a>

        <a class="card card--substack" href="https://teamorchestraai.substack.com/" target="_blank" rel="noreferrer me">
          <span class="card__label">Substack</span>
          <strong class="card__title">Longer writing</strong>
          <span class="card__meta">teamorchestraai.substack.com</span>
        </a>
      </section>
    </main>
  </body>
</html>
